apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      containers:
        - name: inference-api
          image: splee17/fastapi-inference-demo:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inference-api-config